<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Cyrus | Support Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #D4AF37; --pure-white: #FFFFFF; }
        body { background-color: var(--pure-white); font-family: 'Inter', sans-serif; overflow: hidden; }
        .gold-text { color: var(--gold); }
        .gold-bg { background: var(--gold); color: white; }
        .cyrus-bubble { background: rgba(212, 175, 55, 0.1); border-left: 3px solid var(--gold); border-radius: 4px 18px 18px 18px; }
        .user-bubble { background: #F9F9F9; border-radius: 18px; border: 1px solid #EEE; color: #333; }
        .chat-img { max-width: 250px; border-radius: 12px; border: 2px solid var(--gold); }
        #chat-container { scroll-behavior: smooth; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <nav class="p-4 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-50 border border-gray-100 active:scale-90">
                <i class="fa-solid fa-chevron-left text-xs text-gray-400"></i>
            </button>
            <div>
                <h2 class="font-bold text-sm gold-text">Cyrus <span class="text-gray-400 font-normal">| Navigator</span></h2>
                <p class="text-[9px] text-green-600 uppercase font-black tracking-widest flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Systems Active
                </p>
            </div>
        </div>
    </nav>

    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 bg-[#FAFAFA]"></div>

    <div id="preview-bar" class="hidden p-3 bg-white border-t border-gold flex items-center gap-4">
        <img id="img-prev" class="w-16 h-16 rounded object-cover border border-gold">
        <div class="flex-1 text-xs"><b>Screenshot ready</b><br><span onclick="cancelUpload()" class="text-red-500 cursor-pointer">Remove ✕</span></div>
    </div>

    <div class="p-4 bg-white border-t border-gray-100">
        <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-200">
            <label class="w-10 h-10 flex items-center justify-center cursor-pointer text-gray-400 hover:text-gold transition-colors">
                <i class="fa-solid fa-paperclip"></i>
                <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(this)">
            </label>
            <input type="text" id="user-input" placeholder="Message support..." class="flex-1 bg-transparent border-none text-sm outline-none py-2 text-gray-700">
            <button onclick="handleSend()" class="gold-bg w-10 h-10 rounded-xl flex items-center justify-center shadow-md active:scale-95 transition-transform">
                <i class="fa-solid fa-paper-plane text-sm"></i>
            </button>
        </div>
    </div>

    <div id="rating-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-6 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm p-8 text-center rounded-3xl shadow-2xl">
            <h3 class="text-gray-900 font-black text-xl mb-2">Share feedback</h3>
            <p class="text-gray-500 text-sm mb-6">How was your support experience?</p>
            <div class="space-y-3">
                <button onclick="submitRating('🤩')" class="w-full border border-gray-100 p-4 rounded-2xl flex items-center gap-4 hover:bg-yellow-50 transition-all active:scale-95">🤩 Very Satisfied</button>
                <button onclick="submitRating('😊')" class="w-full border border-gray-100 p-4 rounded-2xl flex items-center gap-4 hover:bg-blue-50 transition-all active:scale-95">😊 Satisfied</button>
                <button onclick="submitRating('☹️')" class="w-full border border-gray-100 p-4 rounded-2xl flex items-center gap-4 hover:bg-red-50 transition-all active:scale-95">☹️ Unsatisfied</button>
            </div>
            <button onclick="closeModal()" class="mt-6 text-gray-400 text-[10px] font-black uppercase tracking-widest">Maybe Later</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = { 
            apiKey: "AIzaSyDYZxfER-KfThiRp9MLu869aDrjX9BDOqs", 
            databaseURL: "https://forexquest-fbcac-default-rtdb.firebaseio.com/", 
            projectId: "forexquest-fbcac" 
        };

        // TELEGRAM CONFIG (UPDATED)
        const BOT_TOKEN = '8305268349:AAFugGOJ0mAVxYuB1LFoP4WwC_MHNS6j99c';
        const ADMIN_CHAT_ID = '-1003903750289'; 

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let userId = localStorage.getItem('cyrus_user_id') || "User_" + Math.floor(Math.random() * 9000 + 1000);
        localStorage.setItem('cyrus_user_id', userId);
        
        const chatRef = database.ref('support_chats/' + userId);
        let modalShownThisSession = false;

        // BOT NOTIFICATION LOGIC
        async function notifyAdmin(msg) {
            const text = `🔔 *New Support Message*\n👤 User: \`${userId}\`\n💬 Msg: ${msg}`;
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: text, parse_mode: 'Markdown' })
                });
            } catch (e) { console.error("Notification error", e); }
        }

        function displayMessage(text, sender, isImage = false) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = sender === 'user' ? "flex flex-col items-end w-full" : "flex items-start gap-3 w-full";
            let content = isImage ? `<img src="${text}" class="chat-img" onclick="window.open('${text}')">` : `<p class="text-xs">${text}</p>`;
            
            div.innerHTML = sender === 'user' 
                ? `<div class="user-bubble p-4 max-w-[85%]">${content}</div>`
                : `<div class="w-9 h-9 rounded-full gold-bg flex items-center justify-center text-xs font-black shrink-0">C</div><div class="cyrus-bubble p-4 max-w-[85%]"><p class="text-[10px] gold-text font-black uppercase mb-1">Cyrus</p>${content}</div>`;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        chatRef.on('child_added', (snap) => {
            const data = snap.val();
            if (data.type === 'close_session') {
                const isFresh = (Date.now() - data.time) < 15000;
                if (!modalShownThisSession && isFresh) {
                    document.getElementById('rating-modal').classList.remove('hidden');
                    modalShownThisSession = true;
                }
            } else if (data.sender !== 'user' && data.type !== 'rating_result') {
                displayMessage(data.text, 'cyrus', data.type === 'image');
            } else if (data.sender === 'user' && data.type !== 'rating_result') {
                displayMessage(data.text, 'user', data.type === 'image');
            }
        });

        function previewImage(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    document.getElementById('img-prev').src = e.target.result;
                    document.getElementById('preview-bar').classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function cancelUpload() {
            document.getElementById('image-input').value = "";
            document.getElementById('preview-bar').classList.add('hidden');
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const fileInput = document.getElementById('image-input');
            const file = fileInput.files[0];
            
            if (file) {
                const formData = new FormData();
                formData.append("image", file);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=161f4ec439942b5690f5207ba9fdc277`, { method: "POST", body: formData });
                    const json = await res.json();
                    chatRef.push({ sender: 'user', text: json.data.url, type: 'image', time: Date.now() });
                    notifyAdmin("📸 User sent an image.");
                    cancelUpload();
                } catch (e) { alert("Upload failed."); }
            } else if (input.value.trim()) {
                const msg = input.value.trim();
                chatRef.push({ sender: 'user', text: msg, type: 'text', time: Date.now() });
                notifyAdmin(msg);
                input.value = '';
            }
        }

        function submitRating(val) {
            chatRef.push({ sender: 'user', text: `Feedback: ${val}`, type: 'rating_result', time: Date.now() });
            closeModal();
            setTimeout(() => alert("Thank you!"), 300);
        }

        function closeModal() { document.getElementById('rating-modal').classList.add('hidden'); }
        document.getElementById('user-input').addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });
    </script>
</body>
</html>
