<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Cyrus | Support Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --gold-light: #E8D5A3;
            --gold-dark: #B8960C;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --pure-white: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.4);
            --surface-1: #FAFAFA;
            --surface-2: #F5F3EF;
            --surface-3: #F0EDE8;
            --text-primary: #1A1A1A;
            --text-secondary: #6B7280;
            --text-tertiary: #9CA3AF;
            --success: #10B981;
            --success-glow: rgba(16, 185, 129, 0.3);
        }

        * { 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body { 
            background: linear-gradient(135deg, var(--surface-1) 0%, var(--surface-2) 50%, var(--surface-3) 100%);
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            position: relative;
            height: 100vh;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 20%, rgba(180, 160, 100, 0.02) 0%, transparent 50%);
            animation: floatBg 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 0% 100%, rgba(212, 175, 55, 0.015) 0%, transparent 60%),
                radial-gradient(ellipse at 100% 0%, rgba(212, 175, 55, 0.01) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .gold-text { 
            color: var(--gold); 
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .gold-bg { 
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3), 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gold-bg:hover {
            box-shadow: 0 6px 30px rgba(212, 175, 55, 0.45), 0 4px 12px rgba(0,0,0,0.1);
            transform: translateY(-1px);
        }

        .gold-bg:active {
            transform: scale(0.97) translateY(0);
            box-shadow: 0 2px 12px rgba(212, 175, 55, 0.25);
        }

        .cyrus-bubble { 
            background: linear-gradient(135deg, rgba(255,255,255,0.85) 0%, rgba(250,248,245,0.9) 100%);
            border-left: 3px solid var(--gold);
            border-radius: 4px 20px 20px 20px;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-top: 1px solid rgba(212, 175, 55, 0.08);
            border-right: 1px solid rgba(212, 175, 55, 0.04);
            border-bottom: 1px solid rgba(212, 175, 55, 0.04);
            box-shadow: 
                0 2px 16px rgba(212, 175, 55, 0.06), 
                0 1px 4px rgba(0,0,0,0.03),
                inset 0 1px 0 rgba(255,255,255,0.6);
            animation: slideInLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform-origin: left bottom;
        }

        .user-bubble { 
            background: linear-gradient(135deg, #FFFFFF 0%, #FAFAFA 100%);
            border-radius: 20px 4px 20px 20px;
            border: 1px solid rgba(212, 175, 55, 0.12);
            color: var(--text-primary);
            box-shadow: 
                0 2px 12px rgba(0,0,0,0.04), 
                0 1px 3px rgba(0,0,0,0.02), 
                inset 0 1px 0 rgba(255,255,255,0.8);
            position: relative;
            animation: slideInRight 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            transform-origin: right bottom;
        }

        .user-bubble::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px 5px 21px 21px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(212, 175, 55, 0.05) 50%, transparent 100%);
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px) translateY(8px) scale(0.92); }
            to { opacity: 1; transform: translateX(0) translateY(0) scale(1); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px) translateY(8px) scale(0.92); }
            to { opacity: 1; transform: translateX(0) translateY(0) scale(1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* ════════════════════════════════════════
           iMESSAGE-STYLE MESSAGE REVEAL ANIMATION
           ════════════════════════════════════════ */
        .msg-reveal {
            animation: msgReveal 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            transform: translateY(12px) scale(0.98);
        }

        .msg-reveal-delay-1 { animation-delay: 0.02s; }
        .msg-reveal-delay-2 { animation-delay: 0.06s; }
        .msg-reveal-delay-3 { animation-delay: 0.10s; }
        .msg-reveal-delay-4 { animation-delay: 0.14s; }
        .msg-reveal-delay-5 { animation-delay: 0.18s; }

        @keyframes msgReveal {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
                filter: blur(2px);
            }
            40% {
                opacity: 0.6;
                transform: translateY(4px) scale(0.99);
                filter: blur(1px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .message-group {
            animation: groupReveal 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
        }

        @keyframes groupReveal {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .chat-img { 
            max-width: 250px; 
            border-radius: 14px; 
            border: 2px solid var(--gold);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15), 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: zoom-in;
        }

        .chat-img:hover {
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.25), 0 4px 12px rgba(0,0,0,0.1);
        }

        #chat-container { 
            scroll-behavior: smooth;
            position: relative;
            z-index: 1;
        }

        .glass-nav {
            background: linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.85) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.08);
            box-shadow: 0 1px 20px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.02);
        }

        .status-pulse {
            position: relative;
        }

        .status-pulse::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--success);
            animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            opacity: 0.4;
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(2.2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .secure-badge {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.15);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--success);
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .secure-badge .lock-icon {
            animation: lockPulse 3s ease-in-out infinite;
        }

        @keyframes lockPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .glass-input-bar {
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(250,250,250,0.95) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(212, 175, 55, 0.06);
            box-shadow: 0 -4px 24px rgba(0,0,0,0.04), 0 -1px 8px rgba(0,0,0,0.02);
        }

        .input-wrapper {
            background: linear-gradient(135deg, #F8F8F8 0%, #F0F0F0 100%);
            border: 1.5px solid rgba(0,0,0,0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.02);
        }

        .input-wrapper:focus-within {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 
                0 0 0 4px rgba(212, 175, 55, 0.08), 
                inset 0 2px 4px rgba(0,0,0,0.02), 
                0 2px 8px rgba(212, 175, 55, 0.06);
            background: linear-gradient(135deg, #FFFFFF 0%, #FAFAFA 100%);
        }

        .attach-btn {
            transition: all 0.2s ease;
        }

        .attach-btn:hover {
            color: var(--gold);
            transform: scale(1.1);
        }

        .attach-btn:active {
            transform: scale(0.95);
        }

        .send-btn {
            position: relative;
            overflow: hidden;
        }

        .send-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .send-btn:active::after {
            width: 200%;
            height: 200%;
        }

        .send-btn i {
            transition: transform 0.2s ease;
        }

        .send-btn:hover i {
            transform: translateX(2px);
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.3s ease;
        }

        .modal-card {
            background: linear-gradient(180deg, #FFFFFF 0%, #FAFAFA 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0,0,0,0.15), 
                0 0 0 1px rgba(255,255,255,0.5) inset;
            animation: modalEnter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes modalEnter {
            from { opacity: 0; transform: scale(0.88) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .rating-btn {
            background: linear-gradient(135deg, #FFFFFF 0%, #F8F8F8 100%);
            border: 1px solid rgba(0,0,0,0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .rating-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(212, 175, 55, 0.03) 100%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .rating-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .rating-btn:hover::before {
            opacity: 1;
        }

        .rating-btn:active {
            transform: scale(0.97);
        }

        .rating-btn:nth-child(1):hover { background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%); border-color: rgba(251, 191, 36, 0.3); }
        .rating-btn:nth-child(2):hover { background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); border-color: rgba(59, 130, 246, 0.3); }
        .rating-btn:nth-child(3):hover { background: linear-gradient(135deg, #FEF2F2 0%, #FEE2E2 100%); border-color: rgba(239, 68, 68, 0.3); }

        .preview-bar {
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(250,250,250,0.95) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-img {
            border: 2px solid var(--gold);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(212, 175, 55, 0.15);
            transition: all 0.3s ease;
        }

        .preview-img:hover {
            transform: scale(1.05);
        }

        .back-btn {
            background: linear-gradient(135deg, #F5F5F5 0%, #EEEEEE 100%);
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #EEEEEE 0%, #E0E0E0 100%);
            transform: translateX(-2px);
        }

        .back-btn:active {
            transform: scale(0.92);
        }

        .cyrus-avatar {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            box-shadow: 0 2px 12px rgba(212, 175, 55, 0.3), 0 0 0 2px rgba(212, 175, 55, 0.1);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .cyrus-avatar:hover {
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4), 0 0 0 3px rgba(212, 175, 55, 0.15);
            transform: scale(1.05);
        }

        .cyrus-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        #chat-container::-webkit-scrollbar {
            width: 4px;
        }

        #chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-container::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.2);
            border-radius: 10px;
        }

        #chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(212, 175, 55, 0.35);
        }

        .msg-text {
            line-height: 1.6;
            letter-spacing: -0.01em;
            font-size: 13px;
        }

        .msg-meta {
            letter-spacing: 0.08em;
            font-weight: 800;
            font-size: 10px;
        }

        .msg-time {
            font-size: 9px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            font-weight: 500;
            margin-top: 4px;
            text-align: right;
        }

        .msg-time-left {
            font-size: 9px;
            color: var(--text-tertiary);
            letter-spacing: 0.05em;
            font-weight: 500;
            margin-top: 4px;
        }

        .remove-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .remove-btn:hover {
            color: #DC2626;
            transform: scale(1.1);
        }

        .later-btn {
            transition: all 0.2s ease;
            letter-spacing: 0.12em;
        }

        .later-btn:hover {
            color: var(--gold-dark);
            transform: scale(1.05);
        }

        .chat-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(212, 175, 55, 0.1) 50%, transparent 100%);
            margin: 8px 0;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.85) 0%, rgba(250,248,245,0.9) 100%);
            border-left: 3px solid var(--gold);
            border-radius: 4px 20px 20px 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(212, 175, 55, 0.08);
            border-right: 1px solid rgba(212, 175, 55, 0.04);
            border-bottom: 1px solid rgba(212, 175, 55, 0.04);
            box-shadow: 0 2px 16px rgba(212, 175, 55, 0.06), 0 1px 4px rgba(0,0,0,0.03);
            max-width: 80px;
            animation: slideInLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ════════════════════════════════════════
           LIVE AGENT TYPING SYNC - ENHANCED
           ════════════════════════════════════════ */
        .live-typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(250,248,245,0.95) 100%);
            border-left: 3px solid var(--gold);
            border-radius: 4px 20px 20px 20px;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            box-shadow: 0 2px 16px rgba(212, 175, 55, 0.08), 0 1px 4px rgba(0,0,0,0.03);
            max-width: 200px;
            animation: slideInLeft 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        .live-typing-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .live-typing-dots {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .live-typing-dot {
            width: 5px;
            height: 5px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 50%;
            animation: liveTypingBounce 1.2s ease-in-out infinite;
        }

        .live-typing-dot:nth-child(1) { animation-delay: 0s; }
        .live-typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .live-typing-dot:nth-child(3) { animation-delay: 0.3s; }
        .live-typing-dot:nth-child(4) { animation-delay: 0.45s; }
        .live-typing-dot:nth-child(5) { animation-delay: 0.6s; }

        @keyframes liveTypingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }

        .welcome-icon {
            width: 64px;
            height: 64px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(212, 175, 55, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.1);
            animation: scaleIn 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        .welcome-icon i {
            font-size: 24px;
            color: var(--gold);
        }

        .welcome-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .welcome-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 280px;
        }

        .welcome-hint {
            margin-top: 24px;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.06) 0%, rgba(212, 175, 55, 0.02) 100%);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 16px;
            font-size: 12px;
            color: var(--text-secondary);
            animation: fadeInUp 0.6s ease 0.4s forwards;
            opacity: 0;
        }

        .agent-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.12);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.06em;

        // ════════════════════════════════════════

        chatRef.on('child_added', (snap) => {

                if (!modalShownThisSession && isFresh) {

                displayMessage(data.text, 'cyrus', data.type === 'image', data.time);
            } else if (data.sender === 'user' && data.type !== 'rating_result') {
                displayMessage(data.text, 'user', data.type === 'image', data.time);

        // Auto-send system delay message. Triggers ONCE per idle period.

        // ════════════════════════════════════════════════════════════════════════════

        let delayTimer = null;
        let delayMessageSent = false;
        let lastUserMessageTime = 0;
        let lastAdminMessageTime = 0;

        const DELAY_THRESHOLD = 300000;

        function resetDelayEngine() {
            if (delayTimer) {
                clearTimeout(delayTimer);
                delayTimer = null;
            }
            delayMessageSent = false;
        }

        function startDelayEngine() {
            resetDelayEngine();
            lastUserMessageTime = Date.now();
            delayTimer = setTimeout(() => {
                if (lastAdminMessageTime < lastUserMessageTime && !delayMessageSent) {
                    sendDelaySystemMessage();
                    delayMessageSent = true;
                }
            }, DELAY_THRESHOLD);

            const container = document.getElementById('chat-container');
            const welcomeState = document.getElementById('welcome-state');
            if (welcomeState && !welcomeState.classList.contains('hidden')) {

                lastAdminMessageTime = data.time || Date.now();
                resetDelayEngine();
            }
            if (data && data.sender === 'user' && data.type !== 'rating_result') {
                lastUserMessageTime = data.time || Date.now();
                if (!delayMessageSent) {
                    startDelayEngine();
                }
            }
        });

        // ════════════════════════════════════════════════════════════════════════════
        // FEATURE 3: iMESSAGE-STYLE MESSAGE REVEAL ANIMATION
        // Every incoming and outgoing message animates like iMessage:
        // - fade in + slight upward movement + smooth scale 0.98 to 1
        // - stagger effect per message
        // - Apple-like premium UX
        // ════════════════════════════════════════════════════════════════════════════

        // CSS classes .msg-reveal and .message-group already added to stylesheet
        // displayMessage() already applies msg-reveal class to all bubbles and avatars
        // groupReveal animation applied to message-group wrapper

        // Stagger delay counter for sequential messages
        let staggerCounter = 0;

        function getNextStaggerClass() {
            staggerCounter = (staggerCounter % 5) + 1;
            return 'msg-reveal-delay-' + staggerCounter;
        }

        // Override displayMessage to apply staggered reveal with iMessage-style animation
        const originalDisplayMessage = displayMessage;
        displayMessage = function(text, sender, isImage = false, timestamp = null) {
            const container = document.getElementById('chat-container');
            const welcomeState = document.getElementById('welcome-state');
            if (welcomeState && !welcomeState.classList.contains('hidden')) {
                welcomeState.classList.add('hidden');
            }
            const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const div = document.createElement('div');
            div.className = sender === 'user' ? "flex flex-col items-end w-full message-group" : "flex items-start gap-3 w-full message-group";
            const staggerClass = getNextStaggerClass();
            let content = isImage 
                ? `<img src="${text}" class="chat-img" onclick="window.open('${text}')">` 
                : `<p class="msg-text">${text}</p>`;
            const timeLabel = `<div class="${sender === 'user' ? 'msg-time' : 'msg-time-left'}">${timeStr}</div>`;
            if (sender === 'user') {
                div.innerHTML = `<div class="user-bubble p-4 max-w-[85%] msg-reveal ${staggerClass}">${content}${timeLabel}</div>`;
            } else {
                const agentName = currentAgentName || 'Cyrus';
                div.innerHTML = `
                    <div class="cyrus-avatar w-9 h-9 rounded-full flex items-center justify-center text-xs font-black shrink-0 overflow-hidden msg-reveal ${staggerClass}">
                        <img src="${currentAgentAvatar || ''}" alt="${agentName}" class="w-full h-full object-cover rounded-full" style="${currentAgentAvatar ? '' : 'display:none;'}">
                        <span class="text-white font-black" style="${currentAgentAvatar ? 'display:none;' : ''}">C</span>
                    </div>
                    <div class="cyrus-bubble p-4 max-w-[85%] msg-reveal ${staggerClass}">
                        <p class="msg-meta text-[10px] gold-text uppercase mb-1.5">${agentName}</p>
                        ${content}
                        ${timeLabel}
                    </div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        };
    </script>
</body>
</html>
